<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <link rel="stylesheet" href="../templates/resume.css">
</head>
<body data-density="{{density}}">
{{content}}
<script>
(() => {
  if (window.parent === window) {
    return;
  }

  document.documentElement.dataset.previewInteractive = "true";
  document.addEventListener("click", (event) => {
    const target = event.target.closest("[data-path], [data-section]");
    if (!target) {
      return;
    }

    event.preventDefault();
    window.parent.postMessage({
      type: "resume-preview-section",
      section: target.dataset.section || "",
      path: target.dataset.path || ""
    }, window.parent.location.origin);
  });
})();
</script>
</body>
</html>
